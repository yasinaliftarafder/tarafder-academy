<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | Lecture Player</title>
    <style>
        body { margin: 0; background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .player-card { width: 90%; max-width: 800px; background: #161b22; border-radius: 15px; padding: 15px; border: 1px solid #30363d; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h2 { margin: 0; font-size: 18px; color: #58a6ff; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: black; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        /* ক্লিক প্রোটেকশন লেয়ার */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 60px; z-index: 5; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="header">
        <h2>Tarafder Academy - Sundarbans Tour Vlog</h2>
        <div style="background: #238636; padding: 4px 10px; border-radius: 20px; font-size: 12px;">PREMIUM</div>
    </div>

    <div class="video-container">
        <div class="overlay"></div> <iframe 
            src="https://www.youtube.com/embed/mB5l-X0r38M?rel=0&modestbranding=1&autoplay=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>

</body>
</html>
