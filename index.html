<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <style>
        :root { --main: #ff0000; --bg: #000000; --card: #111111; --border: #222222; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* ড্যাশবোর্ড লুক */
        .dash-container { padding: 40px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .menu-item { background: var(--card); border: 1px solid var(--border); padding: 30px 10px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .menu-item:active { background: #222; transform: scale(0.95); }
        .full { grid-column: span 2; background: #1a1a1a; border-style: dashed; }

        /* তোর সেই কাস্টম ৪কে প্লেয়ার */
        .player-container { width: 100%; max-width: 900px; margin: auto; background: #000; }
        video { width: 100%; border-radius: 5px; box-shadow: 0 0 30px rgba(255,0,0,0.1); }
        
        .controls { background: #111; padding: 15px; display: flex; align-items: center; gap: 15px; border-top: 2px solid var(--main); }
        .progress-bar { flex-grow: 1; height: 6px; background: #333; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: var(--main); box-shadow: 0 0 10px var(--main); }
        
        /* স্পিড ও কোয়ালিটি কন্ট্রোল */
        .badge { background: #222; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        .badge:hover { background: var(--main); }
        .active-speed { background: var(--main); }
    </style>
</head>
<body>

    <div id="dashboard" class="dash-container">
        <h1 style="color: var(--main); letter-spacing: 3px;">TARAFDER ACADEMY</h1>
        <p style="color: #888;">HSC 2026 Batch | Welcome Yasin</p>
        
        <div class="grid">
            <div class="menu-item" onclick="openPlayer()">🎥 Recorded Class</div>
            <div class="menu-item">🔴 Live Class</div>
            <div class="menu-item">📑 Course</div>
            <div class="menu-item">💾 PDF Note</div>
            <div class="menu-item full">⚙️ Settings</div>
        </div>
    </div>

    <div id="player-page" class="hidden">
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="location.reload()" style="background:none; color:white; border:1px solid #444; padding:5px 15px; cursor:pointer;">← Back</button>
            <span style="color: var(--main); font-weight: bold;">PREMIUM 4K PLAYER</span>
        </div>

        <div class="player-container">
            <video id="myVideo" preload="auto">
                <source src="https://youtu.be/mB5l-X0r38M" type="video/mp4">
                তোর ব্রাউজার ভিডিও সাপোর্ট করে না।
            </video>

            <div class="controls">
                <div id="playPause" style="cursor:pointer; font-size: 20px;">▶</div>
                <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
                <div id="speedBtn" class="badge" onclick="changeSpeed()">1X SPEED</div>
                <div class="badge" style="border-color: var(--main);">4K HDR</div>
            </div>
        </div>

        <div style="padding: 20px;">
            <h2 id="videoTitle">Physics Class 01: Sundarbans Special</h2>
            <p style="color: #666; margin-top: 10px;">ভাই, এটা তোর সেই অরিজিনাল প্লেয়ার। এখানে কোনো ইউটিউবের নামগন্ধ নেই। ৪x স্পিড টেস্ট করে দেখ!</p>
        </div>
    </div>

<script>
    const video = document.getElementById('myVideo');
    const playBtn = document.getElementById('playPause');
    const fill = document.getElementById('fill');
    const speedBtn = document.getElementById('speedBtn');

    // প্লে-পজ কন্ট্রোল
    playBtn.addEventListener('click', () => {
        if (video.paused) {
            video.play();
            playBtn.innerText = "⏸";
        } else {
            video.pause();
            playBtn.innerText = "▶";
        }
    });

    // ৪x স্পিড কন্ট্রোল লজিক
    let currentSpeed = 1;
    function changeSpeed() {
        if (currentSpeed === 1) currentSpeed = 2;
        else if (currentSpeed === 2) currentSpeed = 4;
        else currentSpeed = 1;
        
        video.playbackRate = currentSpeed;
        speedBtn.innerText = currentSpeed + "X SPEED";
        speedBtn.classList.toggle('active-speed', currentSpeed > 1);
    }

    // প্রোগ্রেস বার আপডেট
    video.addEventListener('timeupdate', () => {
        const pct = (video.currentTime / video.duration) * 100;
        fill.style.width = pct + "%";
    });

    function openPlayer() {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('player-page').classList.remove('hidden');
    }
</script>

</body>
</html>
