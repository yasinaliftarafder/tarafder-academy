<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <style>
        :root { --main: #ff0000; --bg: #000000; --card: #111111; --border: #222222; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .dash-container { padding: 40px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .menu-item { background: var(--card); border: 1px solid var(--border); padding: 30px 10px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .full { grid-column: span 2; background: #1a1a1a; border-style: dashed; }

        /* ৪কে প্লেয়ার কন্টেইনার */
        .player-container { width: 100%; max-width: 900px; margin: auto; background: #000; position: relative; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; pointer-events: none; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; transform: scale(1.05); }
        
        .controls { background: #111; padding: 15px; display: flex; align-items: center; gap: 15px; border-top: 2px solid var(--main); }
        .progress-bar { flex-grow: 1; height: 6px; background: #333; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--main); box-shadow: 0 0 10px var(--main); transition: 0.1s; }
        
        .badge { background: #222; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #333; }
        .active-speed { background: var(--main); }
    </style>
</head>
<body>

    <div id="dashboard" class="dash-container">
        <h1 style="color: var(--main); letter-spacing: 3px;">TARAFDER ACADEMY</h1>
        <p style="color: #888;">HSC 2026 Batch | Welcome Yasin</p>
        <div class="grid">
            <div class="menu-item" onclick="openPlayer()">🎥 Recorded Class</div>
            <div class="menu-item">🔴 Live Class</div>
            <div class="menu-item">📑 Course</div>
            <div class="menu-item">💾 PDF Note</div>
            <div class="menu-item full">⚙️ Settings</div>
        </div>
    </div>

    <div id="player-page" class="hidden">
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="location.reload()" style="background:none; color:white; border:1px solid #444; padding:5px 15px; cursor:pointer;">← Back</button>
            <span style="color: var(--main); font-weight: bold;">PREMIUM 4K PLAYER</span>
        </div>

        <div class="player-container">
            <div class="video-wrapper">
                <div id="yt-video"></div>
            </div>

            <div class="controls">
                <div id="playPause" style="cursor:pointer; font-size: 20px;">▶</div>
                <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
                <div id="speedBtn" class="badge" onclick="changeSpeed()">1X SPEED</div>
                <div class="badge" style="border-color: var(--main);">4K HDR</div>
            </div>
        </div>
        <div style="padding: 20px;">
            <h2>Physics Class 01: Sundarbans Special</h2>
            <p style="color: #666;">ইউটিউব লোগো ছাড়াই ৪x স্পিডে তোর তরাফদার একাডেমি প্লেয়ার!</p>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const playBtn = document.getElementById('playPause');
        const fill = document.getElementById('fill');
        const speedBtn = document.getElementById('speedBtn');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-video', {
                videoId: 'mB5l-X0r38M', // তোর ইউটিউব ভিডিও আইডি
                playerVars: {
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady() {
            // প্রোগ্রেস বার আপডেট করার জন্য টাইমার
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const pct = (player.getCurrentTime() / player.getDuration()) * 100;
                    fill.style.width = pct + "%";
                }
            }, 500);
        }

        playBtn.addEventListener('click', () => {
            const state = player.getPlayerState();
            if (state == 1) { // 1 মানে Playing
                player.pauseVideo();
                playBtn.innerText = "▶";
            } else {
                player.playVideo();
                playBtn.innerText = "⏸";
            }
        });

        let currentSpeed = 1;
        function changeSpeed() {
            if (currentSpeed === 1) currentSpeed = 2;
            else if (currentSpeed === 2) currentSpeed = 4;
            else currentSpeed = 1;
            
            player.setPlaybackRate(currentSpeed);
            speedBtn.innerText = currentSpeed + "X SPEED";
            speedBtn.classList.toggle('active-speed', currentSpeed > 1);
        }

        function openPlayer() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('player-page').classList.remove('hidden');
        }
    </script>
</body>
</html>
