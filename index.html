<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #58a6ff;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --red: #ff0000;
            --success: #238636;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .app-container { width: 100%; max-width: 480px; padding: 20px; position: relative; }
        .hidden { display: none !important; }

        /* ১. লগইন ও OTP সেকশন */
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-top: 60px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .logo-circle { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--border); background: #010409; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 15px; background: var(--success); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* ২. ড্যাশবোর্ড গ্রিড (৫টি অপশন) */
        .dashboard-header { margin-top: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .menu-card i { font-size: 30px; margin-bottom: 12px; color: var(--primary); }
        .menu-card h3 { font-size: 14px; font-weight: 600; }
        .menu-card:hover { transform: translateY(-5px); border-color: var(--primary); background: #1c2128; }
        .full-width { grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 15px; background: #21262d; }

        /* ৩. ভিডিও প্লেয়ার - তোর মেইন ডিজাইন */
        .player-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-circle { width: 40px; height: 40px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }
        
        .main-player-box { width: 100%; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.7); position: relative; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; pointer-events: none; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; transform: scale(1.04); }

        .custom-controls { background: rgba(22, 27, 34, 0.95); padding: 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border); }
        .play-pause { font-size: 18px; cursor: pointer; width: 30px; }
        .progress-container { flex-grow: 1; height: 6px; background: #333; border-radius: 10px; position: relative; cursor: pointer; }
        .progress-bar { width: 45%; height: 100%; background: var(--red); border-radius: 10px; position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -5px; top: -4px; width: 14px; height: 14px; background: var(--red); border-radius: 50%; box-shadow: 0 0 10px var(--red); }
        .time { font-size: 11px; font-family: monospace; color: #8b949e; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="login-page" class="auth-card">
        <div class="logo-circle">TA</div>
        <h2 style="margin-bottom: 10px;">Tarafder Academy</h2>
        <p style="color: #8b949e; font-size: 14px;">HSC 2026 Premium Batch</p>
        <input type="tel" id="userPhone" placeholder="আপনার মোবাইল নম্বর লিখুন">
        <button class="btn-primary" onclick="goToOtp()">OTP পাঠান</button>
    </div>

    <div id="otp-page" class="auth-card hidden">
        <h2>ভেরিফিকেশন</h2>
        <p style="color: #8b949e; margin-bottom: 10px;">৪ ডিজিটের কোডটি দিন</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <input type="number" placeholder="X" style="width: 50px; text-align: center;">
            <input type="number" placeholder="X" style="width: 50px; text-align: center;">
            <input type="number" placeholder="X" style="width: 50px; text-align: center;">
            <input type="number" placeholder="X" style="width: 50px; text-align: center;">
        </div>
        <button class="btn-primary" onclick="goToDash()">প্রবেশ করুন</button>
    </div>

    <div id="dash-page" class="hidden">
        <div class="dashboard-header">
            <div>
                <h2 style="font-size: 22px;">আসসালামু আলাইকুম!</h2>
                <p style="color: var(--primary); font-size: 14px;">HSC 2026 Batch - Yasin</p>
            </div>
            <div class="logo-circle" style="width: 45px; height: 45px; margin: 0; font-size: 16px;">Y</div>
        </div>

        <div class="grid-container">
            <div class="menu-card">
                <i class="fas fa-broadcast-tower" style="color: #ff4444;"></i>
                <h3>Live Class</h3>
            </div>
            <div class="menu-card" onclick="goToPlayer()">
                <i class="fas fa-play-circle"></i>
                <h3>Recorded Class</h3>
            </div>
            <div class="menu-card">
                <i class="fas fa-book"></i>
                <h3>Course</h3>
            </div>
            <div class="menu-card">
                <i class="fas fa-file-pdf"></i>
                <h3>PDF Note</h3>
            </div>
            <div class="menu-card full-width">
                <i class="fas fa-cog"></i>
                <h3>Settings</h3>
            </div>
        </div>
    </div>

    <div id="player-page" class="hidden">
        <div class="player-header">
            <div class="back-circle" onclick="backToDash()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h3>Physics Class 01</h3>
        </div>

        <div class="main-player-box">
            <div class="video-wrapper">
                <iframe id="videoFrame" src="https://www.youtube.com/embed/mB5l-X0r38M?enablejsapi=1&controls=0&modestbranding=1&rel=0"></iframe>
            </div>
            
            <div class="custom-controls">
                <div class="play-pause"><i class="fas fa-play"></i></div>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <div class="time">15:30 / 28:00</div>
                <i class="fas fa-expand" style="font-size: 14px; color: #8b949e;"></i>
            </div>
        </div>
        <div style="margin-top: 20px; padding: 10px;">
            <h2 style="font-size: 18px; color: var(--primary);">Sundarbans Cinematic Tour</h2>
            <p style="color: #8b949e; font-size: 13px; margin-top: 5px;">Instructor: Tarafder Academy Team</p>
        </div>
    </div>

</div>

<script>
    function goToOtp() {
        if(document.getElementById('userPhone').value.length >= 10) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('otp-page').classList.remove('hidden');
        } else { alert("সঠিক মোবাইল নম্বর দিন ভাই!"); }
    }

    function goToDash() {
        document.getElementById('otp-page').classList.add('hidden');
        document.getElementById('dash-page').classList.remove('hidden');
    }

    function goToPlayer() {
        document.getElementById('dash-page').classList.add('hidden');
        document.getElementById('player-page').classList.remove('hidden');
    }

    function backToDash() {
        document.getElementById('player-page').classList.add('hidden');
        document.getElementById('dash-page').classList.remove('hidden');
    }
</script>

</body>
</html>
