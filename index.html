<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <style>
        :root { --primary: #58a6ff; --bg: #0d1117; --card: #161b22; --border: #30363d; --success: #238636; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--border); background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--success); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .hidden { display: none !important; }

        /* ড্যাশবোর্ড গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: var(--card); border: 1px solid var(--border); padding: 25px 10px; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { border-color: var(--primary); background: #1c2128; }

        /* ভিডিও প্লেয়ার স্টাইল */
        #player-section { width: 100%; max-width: 800px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .back-btn { background: #30363d; margin-bottom: 15px; width: auto; padding: 8px 20px; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-section" class="container card">
        <h2 style="color: var(--primary);">Tarafder Academy</h2>
        <p>মোবাইল নম্বর দিয়ে লগইন করুন</p>
        <input type="tel" id="phone" placeholder="017XXXXXXXX">
        <button onclick="showOtp()">OTP পাঠান</button>
    </div>

    <div id="otp-section" class="container card hidden">
        <h2>ভেরিফিকেশন</h2>
        <p>৪ ডিজিটের কোডটি দিন</p>
        <input type="number" id="otp" placeholder="1234">
        <button onclick="showDashboard()">Login নিশ্চিত করুন</button>
    </div>

    <div id="dashboard-section" class="container hidden">
        <h2 style="margin-bottom: 5px;">Welcome Back!</h2>
        <p style="color: #8b949e; margin-bottom: 25px;">HSC 2026 Premium Batch</p>
        <div class="grid">
            <div class="menu-item" onclick="showPlayer()">🎥<br>Recorded Class</div>
            <div class="menu-item">🔴<br>Live Class</div>
            <div class="menu-item">📚<br>Lecture Notes</div>
            <div class="menu-item">💬<br>Support</div>
        </div>
    </div>

    <div id="player-section" class="container hidden">
        <button class="back-btn" onclick="backToDash()">← Back to Dashboard</button>
        <div class="video-wrapper">
            <iframe id="main-video" src="" allowfullscreen></iframe>
        </div>
        <h3 style="text-align: left; margin-top: 15px; color: var(--primary);">Class 01: Sundarbans Tour Vlog</h3>
    </div>

<script>
    const videoURL = "https://www.youtube.com/embed/mB5l-X0r38M?rel=0&modestbranding=1&autoplay=1";

    function showOtp() {
        let phone = document.getElementById('phone').value;
        if(phone.length >= 10) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
        } else { alert("সঠিক মোবাইল নম্বর দিন!"); }
    }

    function showDashboard() {
        document.getElementById('otp-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        // বডি থেকে সেন্টার ফ্ল্যাগ সরানো যাতে ড্যাশবোর্ড উপরে থাকে
        document.body.style.alignItems = "flex-start";
        document.body.style.paddingTop = "50px";
    }

    function showPlayer() {
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('player-section').classList.remove('hidden');
        document.getElementById('main-video').src = videoURL; // ক্লিক করলে ভিডিও লোড হবে
    }

    function backToDash() {
        document.getElementById('player-section').classList.add('hidden');
        document.getElementById('main-video').src = ""; // ভিডিও বন্ধ হবে
        document.getElementById('dashboard-section').classList.remove('hidden');
    }
</script>

</body>
</html>
