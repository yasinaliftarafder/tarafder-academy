<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <style>
        :root { --primary: #58a6ff; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0d1117; color: white; outline: none; }
        button { width: 100%; padding: 12px; background: #238636; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* ড্যাশবোর্ড গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .menu-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { border-color: var(--primary); transform: translateY(-3px); }

        /* প্লেয়ার সেকশন */
        .player-container { width: 100%; max-width: 800px; display: none; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="card">
        <h2>Tarafder Academy</h2>
        <p>আপনার মোবাইল নম্বর দিন</p>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX">
        <button onclick="showOtp()">OTP পাঠান</button>
    </div>

    <div id="otp-section" class="card hidden">
        <h2>ভেরিফিকেশন</h2>
        <p>আপনার ফোনে পাঠানো কোডটি দিন</p>
        <input type="number" id="otp" placeholder="XXXX">
        <button onclick="showDashboard()">নিশ্চিত করুন</button>
    </div>

    <div id="dashboard-section" class="hidden">
        <h2 style="text-align: center;">Welcome, Yasin!</h2>
        <div class="grid">
            <div class="menu-item" onclick="showPlayer()">🎥 Recorded Class</div>
            <div class="menu-item">🔴 Live Class</div>
            <div class="menu-item">📚 Lecture Notes</div>
            <div class="menu-item">💬 Support</div>
        </div>
    </div>

    <div id="player-section" class="player-container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <button onclick="backToDash()" style="width:auto; padding:5px 15px; background:#30363d;">← Back</button>
            <span style="color:var(--primary)">HSC 2026 Premium</span>
        </div>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/mB5l-X0r38M?rel=0&modestbranding=1&controls=1" 
                allowfullscreen>
            </iframe>
        </div>
        <h3 style="margin-top:15px;">Sundarbans Tour - Cinematic Vlog</h3>
    </div>
</div>

<script>
    function showOtp() {
        if(document.getElementById('phone').value.length > 10) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
        } else { alert('সঠিক নম্বর দিন!'); }
    }

    function showDashboard() {
        document.getElementById('otp-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
    }

    function showPlayer() {
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('player-section').classList.remove('hidden');
    }

    function backToDash() {
        document.getElementById('player-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
    }
</script>

</body>
</html>
