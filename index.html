<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <style>
        :root { --main: #ff0000; --bg: #050505; --card: #121212; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        .hidden { display: none !important; }
        
        /* প্রিমিয়াম ড্যাশবোর্ড ডিজাইন */
        .header { padding: 30px 20px; text-align: center; background: linear-gradient(180deg, #1a1a1a, var(--bg)); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .opt { background: var(--card); border: 1px solid #222; padding: 35px 10px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .opt:active { transform: scale(0.95); background: #1f1f1f; }
        .settings-btn { grid-column: span 2; background: #1a1a1a; border: 1px dashed #444; }

        /* ৪x স্পিড কন্ট্রোলওয়ালা সেই মেইন প্লেয়ার */
        .player-box { width: 100%; max-width: 900px; margin: auto; position: relative; background: #000; }
        .video-area { position: relative; padding-bottom: 56.25%; height: 0; pointer-events: none; }
        .video-area iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; transform: scale(1.05); }

        /* তোর কাস্টম কন্ট্রোল বার */
        .controls { background: rgba(0,0,0,0.9); padding: 15px; display: flex; align-items: center; gap: 15px; border-top: 2px solid #333; }
        .p-bar { flex-grow: 1; height: 6px; background: #333; border-radius: 10px; position: relative; }
        .p-fill { width: 75%; height: 100%; background: var(--main); box-shadow: 0 0 10px var(--main); }
        
        /* ৪x স্পিড বাটন */
        .speed-badge { background: var(--main); padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .quality-badge { border: 1px solid #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div id="dash">
        <div class="header">
            <h1 style="letter-spacing: 2px; color: var(--main);">TARAFDER ACADEMY</h1>
            <p style="color: #666;">HSC 2026 Batch | Welcome Yasin</p>
        </div>
        <div class="grid">
            <div class="opt" onclick="showVid()">🎥 Recorded</div>
            <div class="opt">🔴 Live Class</div>
            <div class="opt">📑 Course</div>
            <div class="opt">💾 PDF Note</div>
            <div class="opt settings-btn">⚙️ Settings</div>
        </div>
    </div>

    <div id="play-area" class="hidden">
        <div style="padding: 15px; display: flex; justify-content: space-between;">
            <button onclick="location.reload()" style="background:none; color:#fff; border:1px solid #444; padding:5px 15px;">← Back</button>
            <span style="color: var(--main);">PREMIUM PLAYER</span>
        </div>
        <div class="player-box">
            <div class="video-area">
                <iframe id="yt" src="https://www.youtube.com/embed/mB5l-X0r38M?enablejsapi=1&controls=0&rel=0&iv_load_policy=3"></iframe>
            </div>
            <div class="controls">
                <div style="cursor:pointer">⏸</div>
                <div class="p-bar"><div class="p-fill"></div></div>
                <div class="time" style="font-size: 12px;">15:24 / 28:00</div>
                <div class="speed-badge" onclick="setSpeed(4)">4X</div>
                <div class="quality-badge">4K HDR</div>
            </div>
        </div>
        <div style="padding: 20px;">
            <h2 style="font-size: 20px;">Sundarbans - The Great Escape</h2>
            <p style="color: #888; font-size: 14px; margin-top: 10px;">৪x স্পিড আর ৪K ভিডিও সাপোর্টসহ তোর সেই অরিজিনাল তরফদার একাডেমি প্লেয়ার এখন লাইভ!</p>
        </div>
    </div>

<script>
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt');
    }

    function showVid() {
        document.getElementById('dash').classList.add('hidden');
        document.getElementById('play-area').classList.remove('hidden');
    }

    function setSpeed(speed) {
        player.setPlaybackRate(speed);
        alert("Speed set to: " + speed + "x");
    }

    // ইউটিউব API লোড করা
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>

</body>
</html>
