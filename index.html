<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarafder Academy | HSC 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* তোর অরিজিনাল হোয়াইট ডিজাইন */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #ffffff; color: #333; min-height: 100vh; overflow-x: hidden; }
        .page { display: none; padding: 20px; transition: 0.3s; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .login-box { background: #f9f9f9; padding: 40px; border-radius: 20px; max-width: 400px; margin: 80px auto; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #333; outline: none; }
        .btn { width: 100%; padding: 14px; background: #e91e63; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 30px auto; }
        .card { background: #f9f9f9; padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid #eee; border-bottom: 4px solid #e91e63; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card i { font-size: 40px; margin-bottom: 10px; color: #e91e63; }

        /* ভিডিও প্লেয়ার সেকশন */
        .player-container {
            position: relative; width: 100%; max-width: 900px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; overflow: hidden; margin: 20px auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        #ytPlayer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* কন্ট্রোলস লেয়ার - ইউটিউবের উপরে থাকবে */
        .controls-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.2);
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; transition: opacity 0.3s; z-index: 10;
        }
        .player-container:hover .controls-overlay { opacity: 1; }
        
        .top-bar { padding: 15px; color: white; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .mid-controls { display: flex; justify-content: center; align-items: center; gap: 40px; color: white; height: 100%; }
        .mid-controls i { font-size: 50px; cursor: pointer; text-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        .bottom-controls { padding: 10px 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .progress-area { height: 5px; width: 100%; background: rgba(255,255,255,0.2); margin-bottom: 10px; cursor: pointer; border-radius: 5px; }
        .progress-bar { height: 100%; width: 0%; background: #e91e63; position: relative; border-radius: 5px; }
        .bottom-btns { display: flex; align-items: center; justify-content: space-between; color: white; }
        .left, .right { display: flex; align-items: center; gap: 15px; }
        select { background: rgba(0,0,0,0.5); color: white; border: 1px solid #444; border-radius: 4px; padding: 2px 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginPage" class="page active">
        <div class="login-box">
            <h1 style="color: #e91e63;">🎓</h1>
            <h2>Tarafder Academy</h2>
            <input type="tel" placeholder="আপনার মোবাইল নম্বর" id="phone">
            <button class="btn" onclick="showPage('otpPage')">OTP পাঠান</button>
        </div>
    </div>

    <div id="otpPage" class="page">
        <div class="login-box">
            <h3>ভেরিফিকেশন</h3>
            <input type="number" placeholder="0000">
            <button class="btn" style="background: #4caf50;" onclick="showPage('homePage')">ভেরিফাই করুন</button>
        </div>
    </div>

    <div id="homePage" class="page">
        <h2 style="text-align: center; margin-top: 20px;">ড্যাশবোর্ড</h2>
        <div class="grid">
            <div class="card" onclick="showPage('lecturePage')">
                <i class="fas fa-play-circle"></i>
                <h3>রেকর্ডেড ক্লাস</h3>
            </div>
            <div class="card"><i class="fas fa-broadcast-tower"></i><h3>লাইভ ক্লাস</h3></div>
            <div class="card"><i class="fas fa-file-alt"></i><h3>লেকচার নোট</h3></div>
            <div class="card"><i class="fas fa-trophy"></i><h3>কুইজ</h3></div>
        </div>
    </div>

    <div id="lecturePage" class="page">
        <h3 style="text-align: center; margin-bottom: 20px;">HSC Biology 1st Paper</h3>
        <div class="card" onclick="playVideo()" style="text-align: left; padding: 15px; max-width: 500px; margin: 10px auto; border-bottom: none; border-left: 4px solid #e91e63;">
            <p>▶️ লেকচার ১: কোষ ও এর গঠন</p>
        </div>
        <div style="text-align: center;"><button class="btn" style="width: auto; background: #555;" onclick="showPage('homePage')">পিছনে যান</button></div>
    </div>

    <div id="videoPage" class="page">
        <div class="player-container" id="mainContainer">
            <div id="ytPlayer"></div>
            <div class="controls-overlay" id="overlay">
                <div class="top-bar">লেকচার ১: কোষ ও এর গঠন (Biology)</div>
                <div class="mid-controls">
                    <i class="fas fa-backward-step" onclick="rewind()"></i>
                    <i class="fas fa-play" id="centerPlayBtn" onclick="togglePlay()"></i>
                    <i class="fas fa-forward-step" onclick="forward()"></i>
                </div>
                <div class="bottom-controls">
                    <div class="progress-area" id="progressArea" onclick="seek(event)">
                        <div class="progress-bar" id="mainProgressBar"></div>
                    </div>
                    <div class="bottom-btns">
                        <div class="left">
                            <i class="fas fa-play" id="bottomPlayBtn" onclick="togglePlay()"></i>
                            <span style="font-size: 14px;"><span id="curr">0:00</span> / <span id="dur">0:00</span></span>
                        </div>
                        <div class="right">
                            <select id="speed" onchange="changeSpeed()">
                                <option value="1">1.0x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2">2.0x</option>
                                <option value="4" selected>4.0x</option>
                            </select>
                            <i class="fas fa-expand" onclick="toggleFull()"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn" style="width: auto; background: #333;" onclick="closeVideo()">ভিডিও বন্ধ করুন</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const progressBar = document.getElementById('mainProgressBar');
        const centerBtn = document.getElementById('centerPlayBtn');
        const bottomBtn = document.getElementById('bottomPlayBtn');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                videoId: 'mB5l-X0r38M',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    let cur = player.getCurrentTime();
                    let dur = player.getDuration();
                    progressBar.style.width = (cur / dur * 100) + "%";
                    document.getElementById('curr').innerText = formatTime(cur);
                    document.getElementById('dur').innerText = formatTime(dur);
                }
            }, 1000);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                centerBtn.classList.replace('fa-play', 'fa-pause');
                bottomBtn.classList.replace('fa-play', 'fa-pause');
            } else {
                centerBtn.classList.replace('fa-pause', 'fa-play');
                bottomBtn.classList.replace('fa-pause', 'fa-play');
            }
        }

        function togglePlay() {
            if (player.getPlayerState() == 1) player.pauseVideo();
            else player.playVideo();
        }

        function rewind() { player.seekTo(player.getCurrentTime() - 10); }
        function forward() { player.seekTo(player.getCurrentTime() + 10); }
        function changeSpeed() { player.setPlaybackRate(parseFloat(document.getElementById('speed').value)); }
        
        function seek(e) {
            let pct = e.offsetX / document.getElementById('progressArea').clientWidth;
            player.seekTo(pct * player.getDuration());
        }

        function formatTime(t) {
            let m = Math.floor(t/60), s = Math.floor(t%60);
            return m + ":" + (s < 10 ? '0'+s : s);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function playVideo() { showPage('videoPage'); setTimeout(() => { player.playVideo(); player.setPlaybackRate(4); }, 1000); }
        function closeVideo() { player.pauseVideo(); showPage('lecturePage'); }
        function toggleFull() { 
            let container = document.getElementById('mainContainer');
            if(!document.fullscreenElement) container.requestFullscreen(); 
            else document.exitFullscreen(); 
        }
    </script>
</body>
</html>
